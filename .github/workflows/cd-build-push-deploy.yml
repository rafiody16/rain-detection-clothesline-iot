name: CD - Build, Push, & Deploy

on:
  workflow_run:
    workflows: ["CI - clothesline-web"]
    types:
      - completed
    branches:
      - main

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/clothesline-web
  GCE_INSTANCE: vps-clotheline
  GCE_ZONE: asia-southeast2-a

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.repository == 'afifahnisa17/rain-detection-clothesline-iot' }}

    steps:
      - name: 1. Checkout code
        uses: actions/checkout@v4

      - name: 2. Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: 3. Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: 4. Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./clothesline-web
          file: ./clothesline-web/Dockerfile
          push: true
          cache-from: type=gha
          cache-to: type=gha, mode=max
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/clothesline-web:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/clothesline-web:${{ github.sha }}

      - name: 5. Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: 6. Set up cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: 7. Deploy to compute engine
        run: |
          gcloud compute ssh ${{ secrets.VM_USERNAME }}@${{ env.GCE_INSTANCE }} \
            --zone ${{ env.GCE_ZONE }} \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --quiet \
            command " \
              docker pull docker.io/${{ env.IMAGE_NAME }}:${{ github.sha }} && \
              docker stop clothesline-web || true && \
              docker rm clothesline-web || true && \
              docker run -d \
                --name clothesline-web \
                -p 80:3000 \
                -v /home/${{ secrets.VM_USERNAME }}/.env:/app/.env:ro \
                docker.io/${{ env.IMAGE_NAME }}:${{ github.sha }}"
