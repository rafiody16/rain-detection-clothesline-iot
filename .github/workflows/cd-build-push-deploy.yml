name: CD - Build, Push, and Deploy

on:
  workflow_run:
    workflows: ["CI - clothesline-web"]
    types:
      - completed
    branches:
      - main

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/clothesline-web
  GCE_INSTANCE: vps-clotheline
  GCE_ZONE: asia-southeast2-a

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.repository == 'afifahnisa17/rain-detection-clothesline-iot' }}

    steps:
      - name: 1. Checkout code
        uses: actions/checkout@v4

      - name: 2. Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: 3. Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: 4. Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./clothesline-web
          file: ./clothesline-web/Dockerfile
          push: true
          cache-from: type=gha
          cache-to: type=gha, mode=max
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/clothesline-web:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/clothesline-web:${{ github.sha }}

      - name: 5. Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: 6. Set up cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: 7. Deploy to compute engine
        run: |
          gcloud compute instances update-container ${{ env.GCE_INSTANCE }} \
            --container-image docker.io/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --zone ${{ env.GCE_ZONE }} \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --container-mount-host-path=host-path=/home/${{ secrets.VM_USERNAME }}/.env,mount-path=/app/.env,mode=ro
